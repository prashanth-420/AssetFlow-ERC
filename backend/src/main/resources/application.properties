spring.application.name=backend

spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-183edae5-securemycampus485164-ba12.l.aivencloud.com:13403/defaultdb?sslMode=REQUIRED}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:avnadmin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

auth.jwt.secret=${AUTH_JWT_SECRET}
auth.jwt.expiration-ms=${AUTH_JWT_EXPIRATION_MS:86400000}
auth.google.client-id=${AUTH_GOOGLE_CLIENT_ID}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# Twilio SendGrid SMTP Configuration
spring.mail.host=${SENDGRID_SMTP_HOST:smtp.sendgrid.net}
spring.mail.port=${SENDGRID_SMTP_PORT:587}
spring.mail.username=${SENDGRID_SMTP_USERNAME:apikey}
spring.mail.password=${SENDGRID_SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
sendgrid.from.email=${SENDGRID_FROM_EMAIL:assetflow@verify.com}
sendgrid.from.name=${SENDGRID_FROM_NAME:AssetFlow}